name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Get tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build derper binaries
        run: |
          mkdir -p dist
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "linux/arm/v7"
          )
          for PLATFORM in "${PLATFORMS[@]}"; do
            OS="${PLATFORM%%/*}"
            ARCH_VARIANT="${PLATFORM#*/}"
            ARCH="${ARCH_VARIANT%%/*}"
            VARIANT="${ARCH_VARIANT#*/}"
            # arm/v7 -> armv7
            if [ "$VARIANT" != "$ARCH" ]; then
              GOARCH_LABEL="${ARCH}v7"
              GOARM="7"
            else
              GOARCH_LABEL="$ARCH"
              GOARM=""
            fi
            OUTPUT="dist/derper-${OS}-${GOARCH_LABEL}"
            echo "Building $OUTPUT ..."
            GOOS="$OS" GOARCH="$ARCH" GOARM="$GOARM" \
              go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" \
              -o "$OUTPUT" \
              tailscale.com/cmd/derper
          done

      - name: Create checksums
        working-directory: dist
        run: sha256sum derper-* > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/derper-*
            dist/SHA256SUMS.txt

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
